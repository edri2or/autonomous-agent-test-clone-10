name: Get Railway service domain
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  domain:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/get-secretmanager-secrets@v2
        id: ids
        with:
          secrets: |-
            project_id:${{ vars.GCP_PROJECT_ID }}/railway-project-id
            env_id:${{ vars.GCP_PROJECT_ID }}/railway-environment-id
            agent_svc_id:${{ vars.GCP_PROJECT_ID }}/railway-agent-service-id
            n8n_svc_id:${{ vars.GCP_PROJECT_ID }}/railway-n8n-service-id
      - name: Create + read service domains
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          EID: ${{ steps.ids.outputs.env_id }}
          AGENT: ${{ steps.ids.outputs.agent_svc_id }}
          N8N: ${{ steps.ids.outputs.n8n_svc_id }}
        run: |
          set +e
          create_domain() {
            local SVC=$1 LABEL=$2
            local Q='mutation Cre($input: ServiceDomainCreateInput!) { serviceDomainCreate(input: $input) { domain } }'
            local PAYLOAD
            PAYLOAD=$(jq -n --arg q "$Q" --arg svc "$SVC" --arg env "$EID" \
              '{query:$q, variables:{input:{serviceId:$svc, environmentId:$env}}}')
            local RESP
            RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "User-Agent: probe/2.0" \
              -d "$PAYLOAD")
            echo "::group::$LABEL serviceDomainCreate raw"
            echo "$RESP" | jq . 2>&1 || echo "$RESP"
            echo "::endgroup::"
            DOMAIN=$(echo "$RESP" | jq -r '.data.serviceDomainCreate.domain // empty' 2>/dev/null)
            if [ -n "$DOMAIN" ]; then
              echo "::notice::$LABEL domain=https://$DOMAIN"
            else
              ERR=$(echo "$RESP" | jq -r '.errors[0].message // empty' 2>/dev/null)
              [ -n "$ERR" ] && echo "::warning::$LABEL serviceDomainCreate error: $ERR"
            fi
          }
          create_domain "$AGENT" agent
          create_domain "$N8N" n8n
          # Re-query to list current domains
          Q='query Q($id: String!) { service(id: $id) { name serviceInstances { edges { node { domains { serviceDomains { domain } } } } } } }'
          PAYLOAD=$(jq -n --arg q "$Q" --arg id "$AGENT" '{query:$q, variables:{id:$id}}')
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "::group::agent service domains after create"
          echo "$RESP" | jq .
          echo "::endgroup::"
          AGENT_DOM=$(echo "$RESP" | jq -r '.data.service.serviceInstances.edges[].node.domains.serviceDomains[]?.domain' | head -1)
          [ -n "$AGENT_DOM" ] && echo "::notice::FINAL agent domain=https://$AGENT_DOM"
