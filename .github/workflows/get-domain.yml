name: Get Railway service domain
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  domain:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/get-secretmanager-secrets@v2
        id: ids
        with:
          secrets: |-
            project_id:${{ vars.GCP_PROJECT_ID }}/railway-project-id
      - name: Query Railway project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          PID: ${{ steps.ids.outputs.project_id }}
        run: |
          set +e
          Q='query Q($id: String!) { project(id: $id) { name services { edges { node { id name serviceInstances { edges { node { domains { serviceDomains { domain } customDomains { domain } } } } } } } } } }'
          PAYLOAD=$(jq -n --arg q "$Q" --arg id "$PID" '{query:$q, variables:{id:$id}}')
          RESP=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: probe/1.0" \
            -d "$PAYLOAD")
          echo "$RESP" > /tmp/resp.json
          # Extract just the domain strings, emit one annotation per domain
          jq -r '
            .data.project as $p
            | "::notice::project=\($p.name)",
              ($p.services.edges[] | .node as $svc
                | $svc.serviceInstances.edges[] | .node as $si
                | "::notice::service=\($svc.name) id=\($svc.id)",
                  ($si.domains.serviceDomains[]? | "::notice::  serviceDomain=https://\(.domain)"),
                  ($si.domains.customDomains[]?  | "::notice::  customDomain=https://\(.domain)")
              )
          ' /tmp/resp.json 2>&1
          # If jq failed, dump raw
          if [ ! -s /tmp/resp.json ] || ! jq -e '.data' /tmp/resp.json >/dev/null 2>&1; then
            echo "::error::Railway response invalid"
            head -c 800 /tmp/resp.json | tr -d '\n' | head -c 500 | sed 's/^/::error::/'
          fi
