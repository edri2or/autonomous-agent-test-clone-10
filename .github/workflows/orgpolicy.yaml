name: Set OrgPolicy exception for clone (allUsers on Cloud Run)
on: workflow_dispatch
permissions: { contents: read, id-token: write }
jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Grant runtime SA orgpolicy.policyAdmin on project
        env:
          SA: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          PID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set +e
          OUT=$(gcloud projects add-iam-policy-binding "$PID" \
            --member="serviceAccount:$SA" \
            --role="roles/orgpolicy.policyAdmin" \
            --condition=None 2>&1)
          EC=$?
          echo "$OUT"
          if [ $EC -ne 0 ]; then
            echo "$OUT" | head -10 | while IFS= read -r l; do echo "::error::iam: $l"; done
            exit $EC
          fi
          echo "Sleeping 30s for IAM propagation..."
          sleep 30
      - name: Set OrgPolicy override (3 retries)
        env:
          PID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set +e
          cat > /tmp/policy.yaml <<EOF
          name: projects/$PID/policies/iam.allowedPolicyMemberDomains
          spec:
            rules:
              - allowAll: true
          EOF
          for i in 1 2 3 4; do
            OUT=$(gcloud org-policies set-policy /tmp/policy.yaml --project="$PID" 2>&1)
            EC=$?
            echo "Attempt $i exit=$EC"
            echo "$OUT" | head -10
            if [ $EC -eq 0 ]; then
              echo "::notice::OrgPolicy override set (attempt $i)"
              exit 0
            fi
            sleep 30
          done
          echo "$OUT" | head -25 | while IFS= read -r l; do
            [ -z "$l" ] && continue
            echo "::error::orgpolicy: $l"
          done
          exit 1
