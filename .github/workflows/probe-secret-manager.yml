name: Probe Secret Manager (read-only)

# Read-only diagnostic. Confirms a named secret exists in this clone's GCP
# Secret Manager and emits its metadata (state + createTime + byte length) as
# a `::notice::` annotation. NEVER prints the secret value.
#
# Default secret to probe is `github-app-installation-id` because that's the
# one PR #2's rename was meant to populate; can be overridden per dispatch.
#
# This workflow exists for empirical verification of bootstrap state. Safe to
# leave permanently — it's a one-job WIF probe with zero mutations.

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Secret name to probe (kebab-case, ADR-0006)'
        required: true
        default: 'github-app-installation-id'

permissions:
  contents: read
  id-token: write   # WIF

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  probe:
    name: Probe ${{ inputs.secret_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Read secret metadata + emit annotation
        run: |
          set -euo pipefail
          NAME="${{ inputs.secret_name }}"

          if ! gcloud secrets describe "$NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            echo "::error::Secret container '$NAME' does not exist in project '$GCP_PROJECT_ID'."
            exit 1
          fi

          # Metadata only — does NOT disclose value
          META=$(gcloud secrets versions describe latest --secret="$NAME" --project="$GCP_PROJECT_ID" --format='value(name,state,createTime)' 2>/dev/null || true)
          if [ -z "$META" ]; then
            echo "::error::Secret '$NAME' container exists but has no version. (inject_secret skip-on-empty?)"
            exit 1
          fi

          VALUE_LEN=$(gcloud secrets versions access latest --secret="$NAME" --project="$GCP_PROJECT_ID" 2>/dev/null | wc -c)
          echo "::notice::Secret '$NAME' present. metadata=$META value_byte_length=$VALUE_LEN"

          {
            echo "## Secret Manager probe result"
            echo ""
            echo "- **Secret:** \`$NAME\`"
            echo "- **Project:** \`$GCP_PROJECT_ID\`"
            echo "- **Latest version metadata:** \`$META\`"
            echo "- **Value byte length:** \`$VALUE_LEN\`"
            echo ""
            echo "_Value never printed. This probe confirms presence + freshness only._"
          } >> "$GITHUB_STEP_SUMMARY"
