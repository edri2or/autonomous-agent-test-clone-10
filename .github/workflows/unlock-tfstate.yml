name: Force-unlock stale TF state lock
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  unlock:
    runs-on: ubuntu-latest
    steps:
      - name: Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Remove stale lock
        run: |
          gcloud storage ls "gs://${{ vars.TF_STATE_BUCKET }}/terraform/state/" || true
          gcloud storage rm "gs://${{ vars.TF_STATE_BUCKET }}/terraform/state/default.tflock" --quiet || true
          echo "Done."
